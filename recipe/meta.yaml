# NB: this recipe should be synced between sklearnex repo and feedstocks

{% set name = "scikit-learn-intelex" %}
{% set buildnumber = 0 %}
# version is set manually in feedstocks and through git tag in repo
{% set version = "2025.11.0" %}

package:
  # Top-level package name is a placeholder; real artifacts come from outputs.
  name: {{ name|lower }}-split
  # version: {{ environ.get('GIT_DESCRIBE_TAG') }}
  version: {{ version }}

# Reminder: source should point to path for repo or github archive for feedstock
source:
  url: https://github.com/uxlfoundation/scikit-learn-intelex/archive/{{ version }}.tar.gz
  sha256: 5d7217dd786f21cea41f5b6b369f57ec762b52edcfb73c72efbdfa02d54524d0
# source:
#   path: ..

build:
  skip: true  # [not (linux64 or win)]
  number: {{ buildnumber }}
  include_recipe: false
  script_env:
    - DPCPPROOT
    - DALROOT
    - NO_DIST=1  # [win]

# Top-level requirements apply to the shared build.sh/bld.bat that compiles
# and stages host + dpc artifacts once. Each output's pack.sh then copies
# the subset of files that belong to that output.
requirements:
  build:
    - make  # [linux]
    - {{ compiler('dpcpp') }}  # [linux64]
    - {{ compiler('cxx') }}
    # conda-forge feedstock specific
    - {{ stdlib("c") }}
  host:
    - python
    - setuptools
    - cmake
    - clang-format
    - cython
    - jinja2
    - pybind11
    - numpy
    # dal-devel pinning depends on the recipe location (repo or feedstock)
    - dal-devel =={{ version }}
    - impi-devel  # [not win]
    - mpi * impi  # [not win]

outputs:
  - name: scikit-learn-intelex
    build:
      # CPU-only package must not pull GPU/SYCL runtime. Suppress
      # run_exports from the dpcpp compiler so its intel-sycl-rt pin
      # is not inherited by this output.
      ignore_run_exports_from:
        - {{ compiler('dpcpp') }}  # [linux64]
    script: pack.sh  # [linux]
    requirements:
      build:
        - make  # [linux]
        - {{ compiler('dpcpp') }}  # [linux64]
        - {{ compiler('cxx') }}
        - {{ stdlib("c") }}
      host:
        - python
        - setuptools
        - numpy
        - dal-devel =={{ version }}
        - impi-devel  # [not win]
        - mpi * impi  # [not win]
      run:
        - python
        - numpy
        - scikit-learn >=1.0
        # dal-devel has run_exports on conda-forge, so no need to add it.
        - mpi * impi  # [not win]
        - packaging  # [py>=313]
    test:
      requires:
        - pyyaml
        - mpi * impi  # [not win]
        - mpi4py
        # next deps are synced with requirements-test.txt
        - pytest
        - pytest-mock
        - pandas
        - xgboost
        - lightgbm
        - treelite
        - shap
        - catboost
        - array-api-compat
        - array-api-strict
        - array-api-strict <2.4  # [py<312]
      source_files:
        - .ci
        - setup.cfg
        - examples
        - tests
      commands:
        - python -c "from sklearnex import patch_sklearn; patch_sklearn()"
        # CPU host backend must be present.
        - python -c "import onedal._onedal_py_host"
        # DPC backend must NOT be in the CPU package.
        - python -c "import onedal, os, glob; assert not glob.glob(os.path.join(os.path.dirname(onedal.__file__), '_onedal_py_dpc*')), 'DPC backend leaked into CPU package'"  # [linux]
    about:
      summary: Extension for Scikit-learn* (CPU runtime) is a seamless way to speed up your Scikit-learn application.

  - name: scikit-learn-intelex-gpu
    build:
      # GPU split is Linux x86_64 only (matches dal-gpu availability in
      # conda-forge intel_repack-feedstock; see PR #134).
      skip: true  # [not linux64]
      # Do NOT set ignore_run_exports_from here: the dpcpp compiler declares
      # run_exports with a compatible intel-sycl-rt pin.  scikit-learn-intelex-gpu
      # inherits it automatically — no manual pin needed.
    script: pack.sh  # [linux]
    requirements:
      build:
        - make  # [linux]
        - {{ compiler('dpcpp') }}  # [linux64]
        - {{ stdlib("c") }}
      host:
        - python
        - setuptools
        - numpy
        - dal-devel =={{ version }}
        - dal-gpu =={{ version }}  # [linux64]
        - impi-devel
        - mpi * impi
      run:
        - python
        - {{ pin_subpackage('scikit-learn-intelex', exact=True) }}
        - dal-gpu =={{ version }}  # [linux64]
        # intel-sycl-rt / dpcpp-cpp-rt is injected automatically via run_exports
        # from the dpcpp compiler, ensuring the SYCL runtime version matches
        # the compiler used to build.
    test:
      requires:
        - dpcpp-cpp-rt  # [linux64]
      commands:
        # GPU backend .so must be installed by this package.
        - python -c "import onedal, os, glob; assert glob.glob(os.path.join(os.path.dirname(onedal.__file__), '_onedal_py_dpc*')), 'DPC backend missing'"  # [linux]
        # Importing the DPC extension module exercises the SYCL runtime dependency.
        - python -c "import onedal._onedal_py_dpc"  # [linux]
    about:
      summary: Extension for Scikit-learn* (GPU/DPC++ runtime) — enables oneAPI SYCL-based acceleration.

about:
  home: https://uxlfoundation.github.io/scikit-learn-intelex
  license: Apache-2.0
  license_file:
    - LICENSE
    - doc/third-party-programs-sklearnex.txt
  summary: Extension for Scikit-learn* is a seamless way to speed up your Scikit-learn application.
  description: |
    Extension for Scikit-learn is a <strong>free software AI accelerator</strong> designed to deliver over
    <strong>10-100X</strong> acceleration to your existing scikit-learn code. The software acceleration is
    achieved with vector instructions, AI hardware-specific memory optimizations, threading, and optimizations.
    <br/><br/>
    With Extension for Scikit-learn, you can:
    <ul>
    <li>Speed up training and inference by up to 100x with equivalent mathematical accuracy</li>
    <li>Benefit from performance improvements across different hardware configurations, including
        <a href="https://uxlfoundation.github.io/scikit-learn-intelex/latest/oneapi-gpu.html" target="_blank">GPUs</a>
        and <a href="https://uxlfoundation.github.io/scikit-learn-intelex/latest/distributed-mode.html" target="_blank">multi-GPU</a>
        configurations
    </li>
    <li>Integrate the extension into your existing Scikit-learn applications without code modifications</li>
    <li>Continue to use the open-source scikit-learn API</li>
    <li>Enable and disable the extension with a couple of lines of code or at the command line</li>
    </ul>
  dev_url: https://github.com/uxlfoundation/scikit-learn-intelex
  doc_url: https://uxlfoundation.github.io/scikit-learn-intelex

extra:
  recipe-maintainers:
    # GitHub IDs for maintainers of the recipe.
    - napetrov
    - david-cortes-intel
    - maria-Petrova
    - ethanglaser
